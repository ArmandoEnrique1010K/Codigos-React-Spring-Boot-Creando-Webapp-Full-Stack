<!-- Introduce los siguientes comandos en una terminal PowerShell para crear un proyecto de React -->
<!-- 
1. Establece el directorio de trabajo: 'cd <ruta>'
2. Crea un proyecto de React: 'npm create vite@latest', y sigue los siguientes pasos:
2.1. Nombre del proyecto sin espacios ni caracteres especiales
2.2. Selecciona el framework React
2.3. Puedes seleccionar el lenguaje de programación que prefieras (JavaScript o TypeScript)
3. Entra al directorio del proyecto: 'cd <nombre del proyecto>'
4. Instala las dependencias: 'npm install'
-->


<!-- Abre el proyecto al editor de codigo -->
<!-- 
1. Toma la carpeta del proyecto y arrastrala al editor de codigo
2. Abre una terminal dentro del editor de codigo, menú 'Terminal' -> 'New Terminal'
3. Inicia el servidor de desarrollo, introduce el comando 'npm run dev'
4. Abre el navegador y navega a la URL 'http://localhost:5173'
5. Para detener el servidor de desarrollo, pulsa 'Ctrl + C' en la terminal
-->


<!-- Estructura de un proyecto React en Vite -->
<!-- 
1. node_modules: Librerías y dependencias instaladas generadas después de ejecutar 'npm install'.
2. public: Recursos estáticos como imágenes.
3. src: Contiene el código fuente de la aplicación React.
4. index.html: Actúa como el punto de entrada principal para la aplicación React.
5. package.json: Lista de dependencias y scripts del proyecto.
6. vite.config.js: Configuraciones de Vite como plugins, alias y configuraciones de servidor de desarrollo.
-->
